AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Static site: private S3 bucket + CloudFront (OAC). Deploy Next.js `out/` with sync + invalidation.
  Stack tipico: eu-south-1 (Milano) per bucket vicino; CloudFront è globale.

Parameters:
  BucketName:
    Type: String
    Description: Nome bucket S3 univoco globalmente (es. medico-radar-www-prod)

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-oac
        Description: OAC per lettura oggetti da CloudFront
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - Bucket
      - OriginAccessControl
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${AWS::StackName} static site
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref OriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${Bucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}

Outputs:
  BucketName:
    Description: Nome bucket (per aws s3 sync)
    Value: !Ref Bucket
  CloudFrontDistributionId:
    Description: ID distribuzione (per invalidation)
    Value: !Ref Distribution
  CloudFrontDomain:
    Description: hostname cloudfront.net (URL provvisorio)
    Value: !GetAtt Distribution.DomainName
  SiteUrl:
    Description: URL HTTPS principale
    Value: !Sub https://${Distribution.DomainName}
